<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin - Orders</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h3>รายการสั่งซื้อ</h3>
    {% if orders %}
        <table class="table table-striped mt-3">
            <thead>
                <tr>
                    <th>รหัส</th>
                    <th>ชื่อ</th>
                    <th>ยอดรวม</th>
                    <th>ช่องทางชำระเงิน</th>
                    <th>วันที่</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                {% for o in orders %}
                <tr>
                    <td>{{ o.order_id }}</td>
                    <td>{{ o.name }}</td>
                    <td>฿{{ '%.2f'|format(o.total) }}</td>
                    <td>{{ o.payment_method }}</td>
                    <td>{{ o.created_at.strftime('%Y-%m-%d %H:%M:%S') }}</td>
                    <td><a href="/admin/orders/{{ o.id }}" class="btn btn-sm btn-outline-primary">ดู</a></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    {% else %}
        <p class="text-muted mt-3">ยังไม่มีคำสั่งซื้อ</p>
    {% endif %}
    <a href="/admin" class="btn btn-secondary mt-2">กลับ</a>
</div>
</body>
</html>
